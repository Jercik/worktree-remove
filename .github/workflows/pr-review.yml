---
name: PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

jobs:
  approach:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.action == 'opened' }}
    permissions:
      contents: read
      pull-requests: write
      actions: read
    uses: Jercik/axgithub/.github/workflows/pr-review.yml@v1
    with:
      label: approach
      recipes: '[{"recipe":"pr-review-approach-smart","name":"smart draw 1"},{"recipe":"pr-review-approach-fable","name":"fable draw"},"pr-review-approach-2","pr-review-approach-3"]'
      pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}
    secrets:
      # The reusable workflow's secret input keeps its legacy NPM_TOKEN name; the
      # value is the Forgejo read:package PAT for code.j4k.dev.
      NPM_TOKEN: ${{ secrets.FORGEJO_NPM_TOKEN }}
      AXRECIPE_API_KEY: ${{ secrets.AXRECIPE_API_KEY }}

  code:
    permissions:
      contents: read
      pull-requests: write
      actions: read
    uses: Jercik/axgithub/.github/workflows/pr-review.yml@v1
    with:
      label: code
      recipes: '[{"recipe":"pr-review-code-smart","name":"smart draw 1"},{"recipe":"pr-review-code-fable","name":"fable draw"}]'
      pr_number: ${{ github.event.pull_request.number || inputs.pr_number }}
    secrets:
      NPM_TOKEN: ${{ secrets.FORGEJO_NPM_TOKEN }}
      AXRECIPE_API_KEY: ${{ secrets.AXRECIPE_API_KEY }}
